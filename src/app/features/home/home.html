<div class="home-container">
  <div class="home-heading">
    <h1>Foundry Planner</h1>
    <p>Whiteout Survival — Foundry Battle Coordinator</p>
  </div>

  <div class="role-cards">

    <a class="role-card role-card--admin" routerLink="/login">
      <div class="role-card__icon">
        <mat-icon>shield</mat-icon>
      </div>
      <div class="role-card__label">Admin</div>
      <div class="role-card__sub">Manage tasks and battle plans</div>
    </a>

    <a class="role-card role-card--player" routerLink="/player">
      <div class="role-card__icon">
        <mat-icon>person</mat-icon>
      </div>
      <div class="role-card__label">Player</div>
      <div class="role-card__sub">View your assignments and the battle map</div>
    </a>

  </div>
</div>
